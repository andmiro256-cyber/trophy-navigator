name: Build Trophy Navigator Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2"
      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build
        working-directory: src-tauri
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TrophyNavigator-Windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
      - name: Upload msi
        uses: actions/upload-artifact@v4
        with:
          name: TrophyNavigator-Windows-msi
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2"
      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build
        working-directory: src-tauri
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: TrophyNavigator-Linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Create latest.json for updater
        run: |
          VERSION=${{ steps.version.outputs.version }}
          APPIMAGE_SIG=$(cat artifacts/TrophyNavigator-Linux/*.AppImage.sig 2>/dev/null || echo "")
          NSIS_SIG=$(cat artifacts/TrophyNavigator-Windows/*.exe.sig 2>/dev/null || echo "")
          APPIMAGE_FILE=$(find artifacts/TrophyNavigator-Linux -maxdepth 1 -type f -name '*.AppImage' -printf '%f\n' | head -n 1)
          NSIS_FILE=$(find artifacts/TrophyNavigator-Windows -maxdepth 1 -type f -name '*.exe' -printf '%f\n' | head -n 1)
          APPIMAGE_URL_FILE=${APPIMAGE_FILE// /.}
          NSIS_URL_FILE=${NSIS_FILE// /.}
          if [ -z "$APPIMAGE_FILE" ] || [ -z "$NSIS_FILE" ]; then
            echo "Release artifacts not found" >&2
            exit 1
          fi
          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "Trophy Navigator Desktop v$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "$APPIMAGE_SIG",
                "url": "https://github.com/andmiro256-cyber/trophy-navigator/releases/download/v$VERSION/$APPIMAGE_URL_FILE"
              },
              "windows-x86_64": {
                "signature": "$NSIS_SIG",
                "url": "https://github.com/andmiro256-cyber/trophy-navigator/releases/download/v$VERSION/$NSIS_URL_FILE"
              }
            }
          }
          EOF
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Trophy Navigator Desktop v${{ steps.version.outputs.version }}
          body: |
            ## Trophy Navigator Desktop v${{ steps.version.outputs.version }}

            ### Скачать
            - **Windows**: `TrophyNavigator_*_x64-setup.exe`
            - **Linux**: `TrophyNavigator_*_amd64.AppImage`

            ### Обновление
            В приложении: **ℹ О программе → Проверить обновление**
          files: |
            artifacts/TrophyNavigator-Windows/*.exe
            artifacts/TrophyNavigator-Linux/*.AppImage
            latest.json
